name: Build Windows App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        working-directory: artifacts/cs2-demo-manager
        run: npm install

      - name: Install analyzer dependencies
        working-directory: artifacts/cs2-demo-manager/analyzer
        run: npm install

      - name: Build Tauri app
        working-directory: artifacts/cs2-demo-manager
        run: npm run tauri build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cs2-demo-manager-windows
          path: |
            artifacts/cs2-demo-manager/src-tauri/target/release/bundle/**/*
